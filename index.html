<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <div id="header-section">
        <p id="title-section">
          Generate a <br />
          <span class="green-text">random password</span>
        </p>
        <p id="tag-line">Never use an insecure password again.</p>
      </div>

      <button id="password-btn">Generate password</button>
      <hr />

      <div id="password-section">
        <p id="password-one" class="password-box">Password One</p>
        <p id="password-two" class="password-box">Password Two</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
